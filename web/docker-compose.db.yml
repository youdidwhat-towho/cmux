services:
  postgres:
    image: postgres:16-alpine
    container_name: ${CMUX_DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CMUX_DB_NAME}
      POSTGRES_PASSWORD: ${CMUX_DB_PASSWORD}
      POSTGRES_USER: ${CMUX_DB_USER}
    ports:
      - "${CMUX_DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CMUX_DB_USER} -d ${CMUX_DB_NAME}"]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data:
    name: ${CMUX_DB_VOLUME_NAME}
