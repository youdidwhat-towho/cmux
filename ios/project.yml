name: cmux-ios
options:
  bundleIdPrefix: dev.cmux
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Release: release

schemes:
  cmux-ios:
    build:
      targets:
        cmux-ios: all
    test:
      targets:
        - cmux-iosTests

targets:
  cmux-ios:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources
      - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.cmux.ios
        PRODUCT_NAME: cmux iOS
        PRODUCT_MODULE_NAME: cmux_ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: 7WLXT3NR37
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-Dev
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Ghostty-Bridging-Header.h
        CLANG_CXX_LIBRARY: libc++
        HEADER_SEARCH_PATHS[sdk=iphoneos*]:
          - "$(inherited)"
          - "$(SRCROOT)/../GhosttyKit.xcframework/ios-arm64/Headers"
        HEADER_SEARCH_PATHS[sdk=iphonesimulator*]:
          - "$(inherited)"
          - "$(SRCROOT)/../GhosttyKit.xcframework/ios-arm64-simulator/Headers"
        OTHER_LDFLAGS[sdk=iphoneos*]:
          - "$(inherited)"
          - "-lc++"
          - "-framework"
          - "CoreGraphics"
          - "-framework"
          - "CoreText"
          - "-framework"
          - "Metal"
          - "-framework"
          - "Network"
          - "-framework"
          - "QuartzCore"
          - "$(SRCROOT)/../GhosttyKit.xcframework/ios-arm64/libghostty-internal-fat.a"
        OTHER_LDFLAGS[sdk=iphonesimulator*]:
          - "$(inherited)"
          - "-lc++"
          - "-framework"
          - "CoreGraphics"
          - "-framework"
          - "CoreText"
          - "-framework"
          - "Metal"
          - "-framework"
          - "Network"
          - "-framework"
          - "QuartzCore"
          - "$(SRCROOT)/../GhosttyKit.xcframework/ios-arm64-simulator/libghostty-internal-fat.a"
    info:
      path: Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  cmux-iosTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: cmux-ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.cmux.ios.tests
        PRODUCT_NAME: cmux iOS Tests
        GENERATE_INFOPLIST_FILE: "YES"
        DEVELOPMENT_TEAM: 7WLXT3NR37
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/cmux iOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/cmux iOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
        HEADER_SEARCH_PATHS[sdk=iphoneos*]:
          - "$(inherited)"
          - "$(SRCROOT)/../GhosttyKit.xcframework/ios-arm64/Headers"
        HEADER_SEARCH_PATHS[sdk=iphonesimulator*]:
          - "$(inherited)"
          - "$(SRCROOT)/../GhosttyKit.xcframework/ios-arm64-simulator/Headers"
