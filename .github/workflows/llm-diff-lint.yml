name: LLM Diff Lint

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "**/*.swift"
      - "Package.swift"
      - "GhosttyTabs.xcodeproj/**"
      - ".github/llm-diff-lint/**"
      - ".github/workflows/llm-diff-lint.yml"
      - "scripts/llm_diff_lint.py"
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to lint
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  deepseek-rule:
    name: DeepSeek rule (${{ matrix.rule }})
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        rule:
          - swift-concurrency-modernization
          - swift-blocking-runtime
          - swift-logging
          - swiftui-state-layout
          - swift-actor-isolation
          - swift-concurrent-annotation
    steps:
      - name: Checkout trusted workflow code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.repository.default_branch }}

      - name: Resolve pull request
        id: pr
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch complete pull request diff
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr diff "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --patch > "$RUNNER_TEMP/pr.diff"
          wc -c "$RUNNER_TEMP/pr.diff"

      - name: Run DeepSeek lint rule
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          DEEPSEEK_MAX_TOKENS: ${{ vars.DEEPSEEK_MAX_TOKENS || '4096' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          DEEPSEEK_THINKING: ${{ vars.DEEPSEEK_THINKING || 'disabled' }}
          LLM_DIFF_LINT_MAX_DIFF_BYTES: ${{ vars.LLM_DIFF_LINT_MAX_DIFF_BYTES || '5000000' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/llm_diff_lint.py \
            --rule ".github/llm-diff-lint/rules/${{ matrix.rule }}.md" \
            --diff-file "$RUNNER_TEMP/pr.diff" \
            --source-label "pull request ${{ steps.pr.outputs.number }}" \
            --skip-if-missing-key
