name: E2E test with video recording

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or SHA to test
        required: false
        default: ""
      test_filter:
        description: "Test class or class/method (e.g. TerminalHomeUITests or TerminalReconnectUITests/testDirectDaemonReconnectShowsProgressAndRecovers)"
        required: true
      test_timeout:
        description: "Per-test timeout in seconds"
        required: false
        default: "120"
      record_video:
        description: Record the simulator during tests
        required: false
        default: true
        type: boolean
      runner:
        description: "Runner OS (macos-26 or macos-15)"
        required: false
        default: "macos-26"
        type: choice
        options:
          - macos-26
          - macos-15
  push:
    branches:
      - task-move-ios-app-into-cmux-repo

jobs:
  ghosttykit:
    name: prepare GhosttyKit
    runs-on: ${{ inputs.runner || 'macos-26' }}
    timeout-minutes: 30
    env:
      TEST_REF: ${{ inputs.ref || github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | head -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache GhosttyKit.xcframework
        id: cache-ghosttykit
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: GhosttyKit.xcframework
          key: ghosttykit-${{ hashFiles('.gitmodules', 'ghostty') }}

      - name: Download pre-built GhosttyKit.xcframework
        id: download-ghosttykit
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          ./scripts/download-prebuilt-ghosttykit.sh

      - name: Install zig for GhosttyKit fallback
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true' && steps.download-ghosttykit.outcome == 'failure'
        run: |
          set -euo pipefail
          ZIG_REQUIRED="0.15.2"
          if command -v zig >/dev/null 2>&1 && zig version 2>/dev/null | grep -q "^${ZIG_REQUIRED}$"; then
            echo "zig ${ZIG_REQUIRED} already installed"
            zig version
            exit 0
          fi

          case "$(uname -m)" in
            arm64) zig_arch="aarch64" ;;
            x86_64) zig_arch="x86_64" ;;
            *)
              echo "Unsupported macOS architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          echo "Installing zig ${ZIG_REQUIRED} from tarball"
          zig_dir="zig-${zig_arch}-macos-${ZIG_REQUIRED}"
          curl -fSL "https://ziglang.org/download/${ZIG_REQUIRED}/${zig_dir}.tar.xz" -o /tmp/zig.tar.xz
          tar xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/${zig_dir}" >> "$GITHUB_PATH"
          "/tmp/${zig_dir}/zig" version

      - name: Cache Zig packages for GhosttyKit fallback
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true' && steps.download-ghosttykit.outcome == 'failure'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Build GhosttyKit.xcframework fallback
        if: steps.cache-ghosttykit.outputs.cache-hit != 'true' && steps.download-ghosttykit.outcome == 'failure'
        run: |
          set -euo pipefail
          CMUX_GHOSTTYKIT_NO_PREBUILT=1 ./scripts/setup.sh

      - name: Materialize GhosttyKit.xcframework
        run: |
          set -euo pipefail
          test -d GhosttyKit.xcframework
          if [ -L GhosttyKit.xcframework ]; then
            target="$(readlink GhosttyKit.xcframework)"
            rm GhosttyKit.xcframework
            cp -R "$target" GhosttyKit.xcframework
          fi
          test -d GhosttyKit.xcframework
          tar czf "$RUNNER_TEMP/GhosttyKit.xcframework.tar.gz" GhosttyKit.xcframework

      - name: Upload GhosttyKit.xcframework
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ghosttykit-xcframework
          path: ${{ runner.temp }}/GhosttyKit.xcframework.tar.gz
          if-no-files-found: error
          retention-days: 1

  e2e:
    name: e2e (${{ matrix.test_filter }})
    needs: ghosttykit
    runs-on: ${{ inputs.runner || 'macos-26' }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        test_filter: ${{ fromJSON(github.event_name == 'push' && '["TerminalHomeUITests","TerminalHostEditorUITests","TerminalInboxUITests","TerminalInputUITests","TerminalReconnectUITests","AuthPersistenceUITests"]' || format('[{0}]', toJSON(inputs.test_filter))) }}
    env:
      TEST_REF: ${{ inputs.ref || github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | head -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Download GhosttyKit.xcframework
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ghosttykit-xcframework
          path: ${{ runner.temp }}/ghosttykit

      - name: Validate GhosttyKit.xcframework
        run: |
          tar xzf "$RUNNER_TEMP/ghosttykit/GhosttyKit.xcframework.tar.gz" -C .
          test -d GhosttyKit.xcframework

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
          else
            brew install xcodegen
          fi

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ios/.ci-source-packages
          key: ios-spm-${{ inputs.runner || 'macos-26' }}-${{ hashFiles('ios/Package.resolved', 'Package.resolved', 'Packages/CMUXAuthCore/Package.swift') }}
          restore-keys: ios-spm-${{ inputs.runner || 'macos-26' }}-

      - name: Generate iOS project
        working-directory: ios
        run: xcodegen generate

      - name: Resolve Swift packages
        working-directory: ios
        run: |
          set -euo pipefail
          mkdir -p .ci-source-packages
          xcodebuild -project cmux.xcodeproj -scheme cmux \
            -clonedSourcePackagesDirPath "$PWD/.ci-source-packages" \
            -resolvePackageDependencies

      - name: Pick simulator
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(xcrun simctl list devices available | grep 'iPhone 17 Pro (' | head -1 | grep -oE '[A-F0-9-]{36}' || true)"
          if [ -z "$SIMULATOR_ID" ]; then
            SIMULATOR_ID="$(xcrun simctl list devices available | grep 'iPhone' | head -1 | grep -oE '[A-F0-9-]{36}' || true)"
          fi
          if [ -z "$SIMULATOR_ID" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$SIMULATOR_ID" || true
          xcrun simctl bootstatus "$SIMULATOR_ID" -b
          open -a Simulator --args -CurrentDeviceUDID "$SIMULATOR_ID"

      - name: Start simulator recording
        if: ${{ inputs.record_video }}
        run: |
          set -euo pipefail
          VIDEO_PATH="$RUNNER_TEMP/cmux-ios-e2e.mp4"
          xcrun simctl io "${{ steps.simulator.outputs.id }}" recordVideo "$VIDEO_PATH" >/tmp/cmux-ios-record.log 2>&1 &
          echo "CMUX_IOS_RECORD_PID=$!" >> "$GITHUB_ENV"
          echo "CMUX_IOS_VIDEO_PATH=$VIDEO_PATH" >> "$GITHUB_ENV"
          sleep 2

      - name: Run iOS UI test
        working-directory: ios
        env:
          TEST_FILTER: ${{ matrix.test_filter }}
          TEST_TIMEOUT: ${{ inputs.test_timeout || '120' }}
        run: |
          set -euo pipefail
          DERIVED_DATA="$RUNNER_TEMP/cmux-ios-e2e"
          RESULT_BUNDLE_DIR="$RUNNER_TEMP/cmux-ios-e2e-xcresults"
          rm -rf "$DERIVED_DATA" "$RESULT_BUNDLE_DIR"
          mkdir -p "$RESULT_BUNDLE_DIR"
          RESULT_FILTER="$(printf '%s' "$TEST_FILTER" | tr -c '[:alnum:]_.-' '_')"
          RESULT_BUNDLE="$RESULT_BUNDLE_DIR/${RESULT_FILTER}.xcresult"
          echo "Running cmuxUITests/$TEST_FILTER"
          xcodebuild test \
            -project cmux.xcodeproj \
            -scheme cmux \
            -configuration Debug \
            -destination "id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -clonedSourcePackagesDirPath "$PWD/.ci-source-packages" \
            -disableAutomaticPackageResolution \
            -maximum-test-execution-time-allowance "$TEST_TIMEOUT" \
            -only-testing:cmuxUITests/"$TEST_FILTER"

      - name: Prepare artifact names
        if: ${{ always() }}
        id: artifacts
        run: |
          set -euo pipefail
          suffix="$(printf '%s' '${{ matrix.test_filter }}' | tr -c '[:alnum:]_.-' '_')"
          echo "suffix=$suffix" >> "$GITHUB_OUTPUT"

      - name: Stop simulator recording
        if: ${{ always() && inputs.record_video && env.CMUX_IOS_RECORD_PID != '' }}
        run: |
          set +e
          kill -INT "$CMUX_IOS_RECORD_PID"
          wait "$CMUX_IOS_RECORD_PID"
          exit 0

      - name: Upload xcresult
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cmux-ios-e2e-xcresult-${{ steps.artifacts.outputs.suffix }}
          path: ${{ runner.temp }}/cmux-ios-e2e-xcresults
          if-no-files-found: warn

      - name: Upload simulator recording
        if: ${{ always() && inputs.record_video }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cmux-ios-e2e-video-${{ steps.artifacts.outputs.suffix }}
          path: ${{ env.CMUX_IOS_VIDEO_PATH }}
          if-no-files-found: warn

      - name: Shutdown simulator
        if: ${{ always() }}
        run: xcrun simctl shutdown "${{ steps.simulator.outputs.id }}" || true
